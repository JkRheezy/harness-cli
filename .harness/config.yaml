llm:
  provider: kimi
  model: kimi-for-coding
  apiKey: ${KIMI_API_KEY}
  baseUrl: https://api.kimi.com/coding
  maxTokens: 128000
  temperature: 0.2
  timeout: 300000

safety:
  maxExecutionTime: 21600000
  maxErrorRate: 0.5
  maxComplexity: 100

checkpoint:
  enabled: true
  interval: 300000

# GitHub Token 请通过环境变量 GITHUB_TOKEN 设置
github:
  token: ${GITHUB_TOKEN}

projectPath: D:\test\my-project
